version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shared-reimbursement-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=root@123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P root@123 -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reimbursement-network

volumes:
  sqlserver_data:
    driver: local

networks:
  reimbursement-network:
    driver: bridge
