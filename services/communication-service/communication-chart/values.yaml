replicaCount: 1

name: communication
fullname: communication-service

image:
  repository: acrmpiseaashared01.azurecr.io/communication-service-stg
  tag: latest
  pullPolicy: IfNotPresent
  pullSecret: medgopullsecret

service:
  type: ClusterIP
  port: 80
  targetPort: 11151

resources:
  requests:
    cpu: "250m"
    memory: "1200Mi"
  limits:
    cpu: "500m"
    memory: "2400Mi"

env:
  ##javaToolOptions: "-Xss16m"
  name: "application.properties"

#pvcName: claimscore-logs-pvc

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  memoryUtilization: 80

