apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-svc
  labels:
    app: {{ include "facescan-chart.name" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "facescan-chart.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}

