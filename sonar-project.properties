sonar.projectKey=javaapplications
sonar.projectName=javaapplications

# Point Sonar at your Java sources (Spring Boot standard layout)
sonar.sources=src/main/java

# Java analysis requires compiled bytecode
sonar.java.binaries=target/classes

# Keep scans fast/noise-free
sonar.exclusions=**/target/**,**/build/**,**/.git/**,**/.github/**,**/node_modules/**

