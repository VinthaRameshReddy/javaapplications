name: SonarQube Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  sonarqube:
    # Keep this broad so any self-hosted runner can pick it up.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Maven
        shell: powershell
        run: |
          $mvnVer = "3.9.6"
          $base = "https://archive.apache.org/dist/maven/maven-3/$mvnVer/binaries"
          $zipPath = Join-Path $env:RUNNER_TEMP "apache-maven-$mvnVer-bin.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "apache-maven-$mvnVer"

          if (!(Test-Path $zipPath)) {
            Invoke-WebRequest -Uri "$base/apache-maven-$mvnVer-bin.zip" -OutFile $zipPath
          }
          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($zipPath, $extractDir)

          $mvnCmd = (Get-ChildItem -Path $extractDir -Recurse -Filter "mvn.cmd" | Select-Object -First 1).FullName
          if (-not $mvnCmd) { throw "mvn.cmd not found after extraction" }
          "MVN_CMD=$mvnCmd" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build project (skip tests)
        shell: powershell
        run: |
          cd $env:GITHUB_WORKSPACE
          & $env:MVN_CMD -f pom.xml -DskipTests package

      - name: Load SONAR_TOKEN from local config (self-hosted runner)
        shell: powershell
        run: |
          $cfgPath = "C:\Users\RameshReddy\OneDrive - Snapwork Technologies Private Limited\Documents\Desktop\ai-agent\config.py"
          if (!(Test-Path $cfgPath)) { throw "Missing config.py at: $cfgPath" }

          $line = (Get-Content $cfgPath | Select-String -Pattern '^\s*SONAR_TOKEN\s*=' | Select-Object -First 1).Line
          if (-not $line) { throw "SONAR_TOKEN not found in config.py" }

          $tok = $line.Split('=')[1].Trim()
          $tok = $tok.Trim('"')
          if ([string]::IsNullOrWhiteSpace($tok)) { throw "SONAR_TOKEN is empty in config.py" }

          Write-Host "::add-mask::$tok"
          "SONAR_TOKEN=$tok" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download SonarScanner CLI
        shell: powershell
        run: |
          $ver = "7.2.0.5079"
          $base = "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli"
          $zipPath = Join-Path $env:RUNNER_TEMP "sonar-scanner-cli-$ver.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "sonar-scanner-cli-$ver"

          if (!(Test-Path $zipPath)) {
            Invoke-WebRequest -Uri "$base/sonar-scanner-cli-$ver.zip" -OutFile $zipPath
          }

          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($zipPath, $extractDir)

          $scannerBat = (Get-ChildItem -Path $extractDir -Recurse -Filter "sonar-scanner.bat" | Select-Object -First 1).FullName
          if (-not $scannerBat) { throw "sonar-scanner.bat not found after extraction" }

          "SCANNER_BAT=$scannerBat" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run SonarQube scan
        shell: powershell
        run: |
          # --% prevents PowerShell from interpreting tokens that start with '-'.
          & $env:SCANNER_BAT --% -Dsonar.host.url=http://localhost:9000 -Dsonar.login=$env:SONAR_TOKEN -Dsonar.projectBaseDir=. -Dsonar.projectKey=javaapplications

